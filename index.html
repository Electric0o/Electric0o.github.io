<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Printing On-Demand</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            overflow-x: hidden;
        }

        header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #ff512f;
        }

        .language-options {
            margin-left: auto;
        }

        .language-options select {
            padding: 5px;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ddd;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .service-card h3 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .service-card p {
            font-size: 1rem;
        }

        .cta {
            text-align: center;
            margin-top: 30px;
        }

        .cta a {
            background: linear-gradient(45deg, #ff512f, #dd2476);
            color: #fff;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.2rem;
            transition: background 0.3s ease;
        }

        .cta a:hover {
            background: linear-gradient(45deg, #dd2476, #ff512f);
        }

        footer {
            background: rgba(0, 0, 0, 0.7);
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
        }

        .shop-container {
            text-align: center;
            padding: 40px;
        }

        .calculator {
            margin: 20px auto;
            max-width: 400px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .calculator label, .calculator input {
            display: block;
            margin: 10px 0;
            font-size: 1rem;
        }

        .calculator input[type="number"] {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .calculator button {
            background: linear-gradient(45deg, #ff512f, #dd2476);
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
        }

        .calculator button:hover {
            background: linear-gradient(45deg, #dd2476, #ff512f);
        }

        .calculator .result {
            margin-top: 10px;
            font-size: 1.2rem;
        }
    </style>
    <script>
        function calculateCost() {
            const filamentCost = parseFloat(document.getElementById('filament-cost').value);
            const filamentWeight = parseFloat(document.getElementById('filament-weight').value);
            const maintenanceCost = filamentWeight * 0.02;
            const energyCost = filamentWeight * 0.02;
            const result = filamentCost * filamentWeight + maintenanceCost + energyCost;

            if (!isNaN(result)) {
                document.getElementById('total-cost').innerText = `Total Cost: €${result.toFixed(2)}`;
            } else {
                document.getElementById('total-cost').innerText = "Please enter valid values.";
            }
        }

        function switchLanguage(lang) {
            const texts = {
                en: {
                    home: "Home",
                    shop: "Shop",
                    contacts: "Contacts",
                    contactInfo: "Contact: elec5854@gmail.com or Tel: 57383840",
                    shopTitle: "Printing On-Demand",
                    filamentCostLabel: "Filament Cost per kg (€):",
                    filamentWeightLabel: "Filament Weight (kg):",
                    calculate: "Calculate Total Cost",
                    totalCost: "Total Cost"
                },
                de: {
                    home: "Startseite",
                    shop: "Geschäft",
                    contacts: "Kontakte",
                    contactInfo: "Kontakt: elec5854@gmail.com oder Tel.: 57383840",
                    shopTitle: "3D-Druck auf Abruf",
                    filamentCostLabel: "Filamentkosten pro kg (€):",
                    filamentWeightLabel: "Filamentgewicht (kg):",
                    calculate: "Gesamtkosten berechnen",
                    totalCost: "Gesamtkosten"
                },
                nl: {
                    home: "Homepagina",
                    shop: "Winkel",
                    contacts: "Contacten",
                    contactInfo: "Contact: elec5854@gmail.com of Tel.: 57383840",
                    shopTitle: "3D-printen op aanvraag",
                    filamentCostLabel: "Filamentkosten per kg (€):",
                    filamentWeightLabel: "Filamentgewicht (kg):",
                    calculate: "Totale kosten berekenen",
                    totalCost: "Totale kosten"
                }
            };

            const t = texts[lang];
            document.getElementById("home-link").innerText = t.home;
            document.getElementById("shop-link").innerText = t.shop;
            document.getElementById("contacts-link").innerText = t.contacts;
            document.getElementById("contact-info").innerText = t.contactInfo;
            document.getElementById("shop-title").innerText = t.shopTitle;
            document.getElementById("filament-cost-label").innerText = t.filamentCostLabel;
            document.getElementById("filament-weight-label").innerText = t.filamentWeightLabel;
            document.getElementById("calculate-button").innerText = t.calculate;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('language').addEventListener('change', (e) => {
                switchLanguage(e.target.value);
            });
        });
    </script>
</head>

<body>
    <header>
        <a href="#" class="logo">3D Printing</a>
        <nav>
            <a id="home-link" href="#">Home</a>
            <a id="shop-link" href="#shop-page">Shop
